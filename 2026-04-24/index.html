<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서로 다른 세계가 접속하는 방식</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw; height: 100vh;
      overflow: hidden;
      cursor: none;
      font-family: 'Noto Sans KR', sans-serif;
    }

    /* ── Two worlds split ── */
    .world {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      overflow: hidden;
    }

    .world.left {
      left: 0;
      background: #050510;
      color: #e8e4dc;
    }

    .world.right {
      right: 0;
      background: #f5c330;
      color: #1a1a0f;
    }

    /* ── Left: digital texture ── */
    .world.left::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        repeating-linear-gradient(
          0deg,
          rgba(100, 200, 255, 0.12) 0px,
          rgba(100, 200, 255, 0.12) 1px,
          transparent 1px,
          transparent 3px
        ),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.5;
      mix-blend-mode: screen;
    }

    .world.left::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(100, 200, 255, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(100, 200, 255, 0.1) 1px, transparent 1px),
        linear-gradient(rgba(100, 200, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(100, 200, 255, 0.04) 1px, transparent 1px);
      background-size: 80px 80px, 80px 80px, 16px 16px, 16px 16px;
      opacity: 0.9;
    }

    /* SVG canvas inside each world */
    .signal-canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* Text fragments */
    .fragments {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.55;
    }

    .fragment {
      position: absolute;
      white-space: nowrap;
      pointer-events: none;
      will-change: transform;
    }

    /* Left dialogue text */
    .world.left .fragment.dialogue {
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.45rem, 0.6vw, 0.6rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      color: #9ad4ff;
    }

    /* Right text fragments */
    .world.right .fragment {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: clamp(0.48rem, 0.6vw, 0.62rem);
      font-weight: 300;
      color: #2a1a08;
      letter-spacing: -0.01em;
    }

    .world.right .fragment.key {
      font-size: clamp(0.58rem, 0.75vw, 0.78rem);
      font-weight: 500;
      color: #1a1005;
    }

    /* Numeric labels on right (scientific readouts) */
    .world.right .fragment.num {
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.42rem, 0.55vw, 0.58rem);
      font-weight: 400;
      color: #1a1005;
      letter-spacing: -0.02em;
    }

    /* Center divider */
    .divider {
      position: absolute;
      top: 0; left: 50%;
      width: 1px; height: 100%;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(128,128,128,0.3) 30%,
        rgba(128,128,128,0.3) 70%,
        transparent 100%
      );
      z-index: 5;
      transition: background 0.8s;
    }

    .divider.connecting {
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(255,220,100,0.7) 30%,
        rgba(255,220,100,0.7) 70%,
        transparent 100%
      );
      box-shadow: 0 0 40px rgba(255,220,100,0.5);
    }

    /* ── Title: constellation-style ── */
    .title {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1s ease, filter 1s ease;
      width: 96vw;
    }

    .title svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .title.connecting {
      opacity: 1;
      filter:
        drop-shadow(0 0 20px rgba(255, 240, 150, 0.9))
        drop-shadow(0 0 50px rgba(255, 220, 100, 0.7))
        drop-shadow(0 0 100px rgba(255, 200, 80, 0.5));
    }

    .title .node {
      transition: fill 0.3s;
    }

    .title .node.left-side { fill: #ffffff; }
    .title .node.right-side { fill: #1a1a0f; }

    .title .connection {
      stroke-width: 1;
      fill: none;
      opacity: 0.4;
    }

    .title .connection.left-side { stroke: #ffffff; }
    .title .connection.right-side { stroke: #1a1a0f; }

    .title .num-label {
      font-family: 'Space Mono', monospace;
      font-size: 7px;
      font-weight: 400;
      letter-spacing: -0.03em;
      pointer-events: none;
    }

    .title .num-label.left-side { fill: #ffffff; }
    .title .num-label.right-side { fill: #1a1a0f; }

    .subtitle {
      position: absolute;
      top: calc(50% + clamp(2rem, 5vw, 4rem));
      left: 50%;
      transform: translate(-50%, 0);
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.2s ease 0.3s;
      color: rgba(100,100,100,0.7);
    }

    .subtitle.connecting { opacity: 1; }

    /* ── Custom cursors ── */
    .cursor {
      position: fixed;
      width: 28px; height: 28px;
      pointer-events: none;
      z-index: 20;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference;
    }

    .cursor .ring {
      position: absolute;
      inset: 0;
      border: 1.5px solid currentColor;
      border-radius: 50%;
      transition: transform 0.3s ease, border-color 0.3s;
    }

    .cursor .dot {
      position: absolute;
      top: 50%; left: 50%;
      width: 4px; height: 4px;
      background: currentColor;
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }

    .cursor { color: #ffffff; }

    .cursor.near-center .ring {
      transform: scale(1.6);
      border-color: #ffd864;
    }

    .pulse {
      position: fixed;
      width: 100px; height: 100px;
      border-radius: 50%;
      border: 2px solid rgba(255,220,100,0.6);
      pointer-events: none;
      z-index: 15;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
    }

    .pulse.active {
      animation: pulseOut 1.2s ease-out forwards;
    }

    @keyframes pulseOut {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(4); opacity: 0; }
    }

    .hint {
      position: absolute;
      bottom: 4vh;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: rgba(128,128,128,0.6);
      z-index: 10;
      pointer-events: none;
      animation: hintFade 2.5s ease-in-out infinite;
    }

    @keyframes hintFade {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }

    .hint.hidden { display: none; }

    .source-link {
      position: fixed;
      bottom: 2.5vh;
      right: 2.5vw;
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: rgba(26, 16, 5, 0.4);
      text-decoration: none;
      z-index: 30;
      transition: color 0.3s;
    }
    .source-link:hover { color: rgba(26, 16, 5, 0.9); }

    .home-btn {
      position: fixed; top: 2.5vh; left: 2.5vw; z-index: 50;
      text-decoration: none;
      color: rgba(255,255,255,0.35);
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem; font-weight: 400;
      letter-spacing: 0.12em;
      transition: color 0.3s;
      mix-blend-mode: difference;
    }
    .home-btn:hover { color: rgba(255,255,255,0.7); }
  </style>
</head>
<body>

<a class="home-btn" href="../index.html">HOME</a>

<div class="world left">
  <svg class="signal-canvas" id="leftCanvas" preserveAspectRatio="none"></svg>
  <div class="fragments" id="fragsLeft"></div>
</div>

<div class="world right">
  <svg class="signal-canvas" id="rightCanvas" preserveAspectRatio="none"></svg>
  <div class="fragments" id="fragsRight"></div>
</div>

<div class="divider" id="divider"></div>

<div class="title" id="title"></div>

<div class="subtitle" id="subtitle">— how two worlds connect —</div>

<div class="hint" id="hint">move toward the center</div>

<a class="source-link" href="https://economychosun.com/site/data/html_dir/2026/04/20/2026042000037.html" target="_blank" rel="noopener">원문 기사 ↗</a>

<div class="cursor" id="cursorReal"><div class="ring"></div><div class="dot"></div></div>
<div class="cursor" id="cursorMirror"><div class="ring"></div><div class="dot"></div></div>

<script>
  const vw = () => window.innerWidth;
  const vh = () => window.innerHeight;

  const cursorReal = document.getElementById('cursorReal');
  const cursorMirror = document.getElementById('cursorMirror');
  const title = document.getElementById('title');
  const subtitle = document.getElementById('subtitle');
  const divider = document.getElementById('divider');
  const hint = document.getElementById('hint');
  const fragsLeft = document.getElementById('fragsLeft');
  const fragsRight = document.getElementById('fragsRight');
  const leftCanvas = document.getElementById('leftCanvas');
  const rightCanvas = document.getElementById('rightCanvas');

  const SVG_NS = 'http://www.w3.org/2000/svg';

  // ═══════════════════════════════════════════════════════════
  // Constellation title — render Korean text as nodes + lines
  // ═══════════════════════════════════════════════════════════

  function buildConstellationTitle() {
    const title = document.getElementById('title');
    const lines = ['서로 다른 세계', '접속하는 방식'];

    // Much larger font size — fills the screen
    const fontSize = 240;
    const padding = 30;
    const lineGap = 20;

    // Measure both lines
    const measureCanvas = document.createElement('canvas');
    const mctx = measureCanvas.getContext('2d');
    mctx.font = `900 ${fontSize}px "Noto Sans KR", sans-serif`;

    let maxW = 0;
    lines.forEach(line => {
      const w = mctx.measureText(line).width;
      if (w > maxW) maxW = w;
    });

    const textH = fontSize * 1.15;
    const totalH = textH * lines.length + lineGap * (lines.length - 1);

    // Build offscreen canvas with all lines
    const scale = 1;
    const canvas = document.createElement('canvas');
    canvas.width = (maxW + padding * 2) * scale;
    canvas.height = (totalH + padding * 2) * scale;
    const ctx = canvas.getContext('2d');
    ctx.font = `900 ${fontSize}px "Noto Sans KR", sans-serif`;
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#000';

    const centerX = canvas.width / 2;
    lines.forEach((line, i) => {
      const y = padding + textH / 2 + i * (textH + lineGap);
      ctx.fillText(line, centerX, y);
    });

    // Sample pixels on a grid — denser for large text
    const step = 18;
    const nodes = [];
    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

    for (let y = 0; y < canvas.height; y += step) {
      for (let x = 0; x < canvas.width; x += step) {
        const idx = (y * canvas.width + x) * 4;
        if (imgData[idx + 3] > 128) {
          nodes.push({ x, y });
        }
      }
    }

    // Build SVG
    const svgW = canvas.width;
    const svgH = canvas.height;
    const svg = document.createElementNS(SVG_NS, 'svg');
    svg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);
    svg.setAttribute('xmlns', SVG_NS);
    svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

    const midX = svgW / 2;

    // Connections
    const maxConnectDist = step * 2.3;
    nodes.forEach((n, i) => {
      const neighbors = nodes
        .map((m, j) => ({ m, j, d: Math.hypot(m.x - n.x, m.y - n.y) }))
        .filter(o => o.j > i && o.d > 0 && o.d < maxConnectDist)
        .slice(0, 2);

      neighbors.forEach(({ m }) => {
        const line = document.createElementNS(SVG_NS, 'line');
        line.setAttribute('x1', n.x);
        line.setAttribute('y1', n.y);
        line.setAttribute('x2', m.x);
        line.setAttribute('y2', m.y);
        const midPointX = (n.x + m.x) / 2;
        line.setAttribute('class', 'connection ' + (midPointX < midX ? 'left-side' : 'right-side'));
        svg.appendChild(line);
      });
    });

    // Nodes (circles)
    nodes.forEach((n, i) => {
      const circle = document.createElementNS(SVG_NS, 'circle');
      circle.setAttribute('cx', n.x);
      circle.setAttribute('cy', n.y);
      const r = 2.5 + Math.random() * 4;
      circle.setAttribute('r', r);
      circle.setAttribute('class', 'node ' + (n.x < midX ? 'left-side' : 'right-side'));
      svg.appendChild(circle);

      if (Math.random() < 0.08) {
        const label = document.createElementNS(SVG_NS, 'text');
        label.setAttribute('x', n.x + 6);
        label.setAttribute('y', n.y - 4);
        label.setAttribute('class', 'num-label ' + (n.x < midX ? 'left-side' : 'right-side'));
        label.textContent = (Math.random() * 500).toFixed(3);
        svg.appendChild(label);
      }
    });

    title.appendChild(svg);
  }

  // Build after fonts load (so text metrics are correct)
  if (document.fonts) {
    document.fonts.ready.then(buildConstellationTitle);
  } else {
    setTimeout(buildConstellationTitle, 500);
  }

  // ═══════════════════════════════════════════════════════════
  // LEFT: Waveform SVG fragments drifting like signals
  // ═══════════════════════════════════════════════════════════

  function makeWaveform(width, amplitude, frequency, type) {
    const height = amplitude * 2 + 4;
    const points = [];
    const steps = 60;
    for (let i = 0; i <= steps; i++) {
      const x = (i / steps) * width;
      let y;
      if (type === 'sine') {
        y = amplitude + Math.sin(i * frequency) * amplitude * 0.9;
      } else if (type === 'noise') {
        y = amplitude + (Math.sin(i * frequency) + Math.sin(i * frequency * 2.3) * 0.5) * amplitude * 0.7;
      } else if (type === 'pulse') {
        y = amplitude + (Math.abs(Math.sin(i * frequency * 0.7)) ** 3) * amplitude * 0.9 * (Math.random() > 0.3 ? 1 : -1);
      } else { // spike
        y = amplitude + (Math.sin(i * frequency) ** 7) * amplitude * 0.95;
      }
      points.push(`${x.toFixed(1)},${y.toFixed(1)}`);
    }
    return `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg">
      <polyline points="${points.join(' ')}" fill="none" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;
  }

  const leftWaveTypes = ['sine', 'noise', 'pulse', 'spike'];
  const leftWaveEls = [];

  function initWaves() {
    leftCanvas.innerHTML = '';
    // Remove previous wave fragments
    fragsLeft.querySelectorAll('.fragment.wave').forEach(el => el.remove());
    leftWaveEls.length = 0;

    for (let i = 0; i < 28; i++) {
      const f = document.createElement('div');
      f.className = 'fragment wave';
      f.style.color = '#6db4ff';
      f.style.opacity = (0.35 + Math.random() * 0.35).toFixed(2);
      const width = 40 + Math.random() * 80;
      const amp = 3 + Math.random() * 8;
      const freq = 0.25 + Math.random() * 1.5;
      const type = leftWaveTypes[Math.floor(Math.random() * leftWaveTypes.length)];
      f.innerHTML = makeWaveform(width, amp, freq, type);
      fragsLeft.appendChild(f);
      leftWaveEls.push({
        el: f,
        x: Math.random() * 90,
        y: Math.random() * 95,
        vx: (Math.random() - 0.5) * 0.04,
        vy: (Math.random() - 0.5) * 0.04,
        phase: Math.random() * Math.PI * 2,
      });
    }
  }

  function drawWaves(t) {
    leftWaveEls.forEach(w => {
      w.x += w.vx;
      w.y += w.vy;
      if (w.x < 0 || w.x > 85) w.vx *= -1;
      if (w.y < 0 || w.y > 92) w.vy *= -1;
      w.el.style.left = w.x + '%';
      w.el.style.top = w.y + '%';
    });
  }

  initWaves();

  // Left dialogue text (repeated for ambient background)
  const leftDialoguesBase = [
    'Amaze! Amaze! Amaze!',
    '이제 뭐함. 질문?',
    '집에 가자, 평서문',
  ];
  const leftDialogues = [];
  for (let r = 0; r < 3; r++) {
    leftDialoguesBase.forEach(d => leftDialogues.push(d));
  }

  const leftDialogueEls = [];
  leftDialogues.forEach((text, i) => {
    const f = document.createElement('div');
    f.className = 'fragment dialogue';
    f.textContent = text;
    fragsLeft.appendChild(f);
    leftDialogueEls.push({
      el: f,
      x: 5 + Math.random() * 85,
      y: 5 + Math.random() * 90,
      vx: (Math.random() - 0.5) * 0.03,
      vy: (Math.random() - 0.5) * 0.03,
      phase: Math.random() * Math.PI * 2,
    });
  });

  // ═══════════════════════════════════════════════════════════
  // RIGHT: Scientific data — circles connected by lines, numbers,
  // all moving like cells under a microscope
  // ═══════════════════════════════════════════════════════════

  const NUM_CELLS = 14;
  const cells = [];
  const rightNumberEls = [];

  function initCells() {
    const halfW = vw() / 2;
    const H = vh();
    rightCanvas.setAttribute('viewBox', `0 0 ${halfW} ${H}`);
    rightCanvas.innerHTML = '';

    // Line layer (beneath circles)
    const lineGroup = document.createElementNS(SVG_NS, 'g');
    lineGroup.setAttribute('id', 'rightLines');
    rightCanvas.appendChild(lineGroup);

    // Circle layer
    const circleGroup = document.createElementNS(SVG_NS, 'g');
    circleGroup.setAttribute('id', 'rightCircles');
    rightCanvas.appendChild(circleGroup);

    // Clear number labels
    rightNumberEls.forEach(n => n.el.remove());
    rightNumberEls.length = 0;
    cells.length = 0;

    for (let i = 0; i < NUM_CELLS; i++) {
      const r = 5 + Math.random() * 22;
      const x = r + 20 + Math.random() * (halfW - 2 * r - 40);
      const y = r + 40 + Math.random() * (H - 2 * r - 80);

      const circle = document.createElementNS(SVG_NS, 'circle');
      circle.setAttribute('cx', x);
      circle.setAttribute('cy', y);
      circle.setAttribute('r', r);
      circle.setAttribute('fill', 'none');
      circle.setAttribute('stroke', '#1a1005');
      circle.setAttribute('stroke-width', 0.6);
      circleGroup.appendChild(circle);

      // Number label (floating above circle)
      const numEl = document.createElement('div');
      numEl.className = 'fragment num';
      const val = (Math.random() * 300).toFixed(3);
      numEl.textContent = val;
      fragsRight.appendChild(numEl);

      cells.push({
        circle,
        x, y, r,
        vx: (Math.random() - 0.5) * 0.8,
        vy: (Math.random() - 0.5) * 0.8,
        phase: Math.random() * Math.PI * 2,
        rBase: r,
        rMod: 2 + Math.random() * 4,
      });

      rightNumberEls.push({
        el: numEl,
        cellIdx: i,
      });
    }

    // Lines connecting some cells
    for (let i = 0; i < cells.length; i++) {
      const numConnections = 1 + Math.floor(Math.random() * 2);
      for (let j = 0; j < numConnections; j++) {
        const target = Math.floor(Math.random() * cells.length);
        if (target === i) continue;
        const line = document.createElementNS(SVG_NS, 'line');
        line.setAttribute('stroke', '#1a1005');
        line.setAttribute('stroke-width', 0.5);
        line.setAttribute('opacity', 0.6);
        lineGroup.appendChild(line);
        cells[i].connections = cells[i].connections || [];
        cells[i].connections.push({ target, line });
      }
    }

    // Crosshair markers (like "+" and "-" in the reference)
    for (let i = 0; i < 3; i++) {
      const g = document.createElementNS(SVG_NS, 'g');
      const cx = 30 + Math.random() * (halfW - 60);
      const cy = 30 + Math.random() * (H - 60);
      const size = 8;
      const h = document.createElementNS(SVG_NS, 'line');
      h.setAttribute('x1', cx - size); h.setAttribute('y1', cy);
      h.setAttribute('x2', cx + size); h.setAttribute('y2', cy);
      h.setAttribute('stroke', '#1a1005'); h.setAttribute('stroke-width', 0.6);
      g.appendChild(h);
      if (i % 2 === 0) {
        const v = document.createElementNS(SVG_NS, 'line');
        v.setAttribute('x1', cx); v.setAttribute('y1', cy - size);
        v.setAttribute('x2', cx); v.setAttribute('y2', cy + size);
        v.setAttribute('stroke', '#1a1005'); v.setAttribute('stroke-width', 0.6);
        g.appendChild(v);
      }
      rightCanvas.appendChild(g);
    }
  }

  function drawCells(t) {
    const halfW = vw() / 2;
    const H = vh();

    cells.forEach((c, i) => {
      // Cell movement (like floating under microscope)
      c.x += c.vx;
      c.y += c.vy;

      // Bounce off edges
      if (c.x - c.r < 10 || c.x + c.r > halfW - 10) {
        c.vx *= -1;
        c.x = Math.max(c.r + 10, Math.min(halfW - c.r - 10, c.x));
      }
      if (c.y - c.r < 30 || c.y + c.r > H - 30) {
        c.vy *= -1;
        c.y = Math.max(c.r + 30, Math.min(H - c.r - 30, c.y));
      }

      // Pulsing radius
      const r = c.rBase + Math.sin(t * 0.001 + c.phase) * c.rMod;

      c.circle.setAttribute('cx', c.x);
      c.circle.setAttribute('cy', c.y);
      c.circle.setAttribute('r', r);

      // Update connected lines
      if (c.connections) {
        c.connections.forEach(conn => {
          const target = cells[conn.target];
          conn.line.setAttribute('x1', c.x);
          conn.line.setAttribute('y1', c.y);
          conn.line.setAttribute('x2', target.x);
          conn.line.setAttribute('y2', target.y);
        });
      }
    });

    // Number labels follow their cells
    rightNumberEls.forEach(n => {
      const c = cells[n.cellIdx];
      n.el.style.transform = `translate(${(c.x - 20)}px, ${(c.y - c.r - 18)}px)`;
    });
  }

  initCells();

  // Right: Korean dialogues (moving around independently)
  const rightDialoguesBase = [
    { text: '고마워, 친구', key: true },
    { text: '자는거 보고있을게', key: true },
    { text: '숫자부터 시작하자', key: true },
    { text: '괜찮아?', key: false },
    { text: '너는 거기 있어?', key: false },
    { text: '오늘도 잘 지내', key: false },
    { text: '들려?', key: false },
    { text: '...여보세요', key: false },
    { text: '조금만 더', key: false },
    { text: '응, 여기', key: false },
  ];
  const rightDialogues = [];
  for (let r = 0; r < 2; r++) {
    rightDialoguesBase.forEach(d => rightDialogues.push(d));
  }

  const rightDialogueEls = [];
  rightDialogues.forEach((d, i) => {
    const f = document.createElement('div');
    f.className = 'fragment' + (d.key ? ' key' : '');
    f.textContent = d.text;
    fragsRight.appendChild(f);
    rightDialogueEls.push({
      el: f,
      x: 10 + Math.random() * 80,
      y: 8 + Math.random() * 85,
      vx: (Math.random() - 0.5) * 0.03,
      vy: (Math.random() - 0.5) * 0.03,
      phase: Math.random() * Math.PI * 2,
    });
  });

  // ═══════════════════════════════════════════════════════════
  // Text drift loop (percentage-based, stays within each half)
  // ═══════════════════════════════════════════════════════════

  function driftText(t) {
    leftDialogueEls.forEach(d => {
      d.x += d.vx;
      d.y += d.vy;
      if (d.x < 5 || d.x > 85) d.vx *= -1;
      if (d.y < 10 || d.y > 85) d.vy *= -1;
      const wobble = Math.sin(t * 0.0008 + d.phase) * 2;
      d.el.style.left = d.x + '%';
      d.el.style.top = (d.y + wobble * 0.1) + '%';
    });

    rightDialogueEls.forEach(d => {
      d.x += d.vx;
      d.y += d.vy;
      if (d.x < 5 || d.x > 88) d.vx *= -1;
      if (d.y < 5 || d.y > 92) d.vy *= -1;
      d.el.style.left = d.x + '%';
      d.el.style.top = d.y + '%';
    });
  }

  // ═══════════════════════════════════════════════════════════
  // Main render loop
  // ═══════════════════════════════════════════════════════════

  let mx = vw() / 2, my = vh() / 2;
  let touched = false;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    if (!touched) { touched = true; hint.classList.add('hidden'); }
  });

  document.addEventListener('touchmove', e => {
    mx = e.touches[0].clientX; my = e.touches[0].clientY;
    if (!touched) { touched = true; hint.classList.add('hidden'); }
  }, { passive: true });

  let lastPulse = 0;
  function emitPulse() {
    const now = Date.now();
    if (now - lastPulse < 800) return;
    lastPulse = now;
    const pulse = document.createElement('div');
    pulse.className = 'pulse active';
    pulse.style.left = vw() / 2 + 'px';
    pulse.style.top = my + 'px';
    document.body.appendChild(pulse);
    setTimeout(() => pulse.remove(), 1200);
  }

  function render(t) {
    const centerX = vw() / 2;

    cursorReal.style.left = mx + 'px';
    cursorReal.style.top = my + 'px';
    const mirrorX = centerX * 2 - mx;
    cursorMirror.style.left = mirrorX + 'px';
    cursorMirror.style.top = my + 'px';

    const distFromCenter = Math.abs(mx - centerX);
    const threshold = 100;

    if (distFromCenter < threshold) {
      const proximity = 1 - distFromCenter / threshold;
      cursorReal.classList.add('near-center');
      cursorMirror.classList.add('near-center');
      divider.classList.add('connecting');
      title.classList.add('connecting');
      subtitle.classList.add('connecting');
      title.style.opacity = proximity;
      subtitle.style.opacity = proximity;
      if (proximity > 0.85) emitPulse();
    } else {
      cursorReal.classList.remove('near-center');
      cursorMirror.classList.remove('near-center');
      divider.classList.remove('connecting');
      title.classList.remove('connecting');
      subtitle.classList.remove('connecting');
      title.style.opacity = '';
      subtitle.style.opacity = '';
    }

    drawWaves(t);
    drawCells(t);
    driftText(t);

    requestAnimationFrame(render);
  }
  requestAnimationFrame(render);

  window.addEventListener('resize', () => {
    initWaves();
    initCells();
  });

  if (new URLSearchParams(location.search).get('preview') === '1') {
    mx = vw() / 2;
    my = vh() / 2;
    hint.classList.add('hidden');
  }
</script>

</body>
</html>
