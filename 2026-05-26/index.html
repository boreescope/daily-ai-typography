<style>
:root {
  --paper:      #FFFFFF;
  --paper-deep: #F8FBFF;
  --ink:        #0D0E14;
  --ink-soft:   #1B1D26;
  --grid:       rgba(160, 200, 235, 0.35);
  --grid-bold:  rgba(130, 180, 220, 0.5);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--paper);
  height: 100vh;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  color: var(--ink);
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* Graph paper grid */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(var(--grid-bold) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-bold) 1px, transparent 1px),
    linear-gradient(var(--grid) 0.5px, transparent 0.5px),
    linear-gradient(90deg, var(--grid) 0.5px, transparent 0.5px);
  background-size:
    100px 100px,
    100px 100px,
    20px 20px,
    20px 20px;
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: "";
  position: absolute;
  inset: 0;
  background: transparent;
  pointer-events: none;
  z-index: 0;
}

.topmark {
  position: fixed;
  top: 22px; left: 28px;
  font-family: 'Inter', sans-serif;
  font-weight: 800;
  font-size: 11px;
  letter-spacing: 0.24em;
  color: var(--ink);
  opacity: 0.65;
  z-index: 5;
}
.topmark::before { content: "✶ "; }

.credit {
  position: fixed;
  bottom: 26px; left: 28px;
  z-index: 5;
  font-family: 'Inter', sans-serif;
  font-weight: 800;
  font-size: 10px;
  letter-spacing: 0.26em;
  color: var(--ink);
  opacity: 0.55;
}

.hint {
  position: fixed;
  bottom: 26px; right: 26px;
  z-index: 5;
  font-family: 'Inter', sans-serif;
  font-style: italic;
  font-weight: 800;
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--ink);
  opacity: 0.5;
}

.stage-wrap {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
}

.stage {
  width: 600px;
  height: 670px;
  position: relative;
  cursor: crosshair;
}

.stage svg {
  width: 100%;
  height: 100%;
  display: block;
}

/* Per-stroke subtle wiggle for the letter mask */
.stroke {
  transform-box: fill-box;
  transform-origin: center center;
  will-change: transform;
}

@keyframes wiggle {
  0%   { transform: translate(0, 0) rotate(0deg); }
  100% { transform: translate(var(--dx, 0.8px), var(--dy, -0.6px)) rotate(var(--dr, 0.3deg)); }
}

/* Decorative stars */
.star {
  transform-box: fill-box;
  transform-origin: center center;
  animation: starPulse 3.6s ease-in-out infinite alternate;
}
.star:nth-of-type(2n) { animation-duration: 5.2s; animation-delay: -1.4s; }
.star:nth-of-type(3n) { animation-duration: 4.4s; animation-delay: -2.6s; }

@keyframes starPulse {
  0%   { transform: scale(0.92) rotate(-6deg); }
  100% { transform: scale(1.12) rotate(8deg); }
}

.tagline {
  font-family: 'Inter', sans-serif;
  font-weight: 800;
  font-size: 11px;
  letter-spacing: 0.32em;
  color: var(--ink);
  opacity: 0.55;
  text-align: center;
}

.controls {
  position: fixed;
  top: 22px;
  right: 26px;
  z-index: 10;
  display: flex;
  gap: 8px;
}
.controls button {
  background: transparent;
  border: 2px solid var(--ink);
  color: var(--ink);
  padding: 9px 16px;
  font-family: 'Inter', sans-serif;
  font-weight: 800;
  font-size: 11px;
  letter-spacing: 0.18em;
  font-style: italic;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
.controls button:hover {
  background: var(--ink);
  color: #fff;
}
</style>

<script>
const SVG_NS = 'http://www.w3.org/2000/svg';
const stage = document.getElementById('stage');
const svg = stage.querySelector('svg');
const scribbleStage = document.getElementById('scribbleStage');
const overshootStage = document.getElementById('overshootStage');

const strokeElems = Array.from(document.querySelectorAll('.stroke'));
const strokeData = strokeElems.map(el => {
  const bbox = el.getBBox();
  return { elem: el, bbox, area: Math.max(1, bbox.width * bbox.height) };
});
const TOTAL_AREA = strokeData.reduce((s, d) => s + d.area, 0);

function isInside(elem, x, y) {
  const pt = svg.createSVGPoint();
  pt.x = x; pt.y = y;
  try { return elem.isPointInFill(pt); }
  catch (e) { return false; }
}

function isInsideAny(x, y) {
  for (const s of strokeData) {
    const b = s.bbox;
    if (x < b.x - 0.5 || x > b.x + b.width + 0.5) continue;
    if (y < b.y - 0.5 || y > b.y + b.height + 0.5) continue;
    if (isInside(s.elem, x, y)) return true;
  }
  return false;
}

function findInsideNear(cx, cy, radius) {
  for (let i = 0; i < 30; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = Math.random() * radius;
    const x = cx + Math.cos(a) * r;
    const y = cy + Math.sin(a) * r;
    if (isInsideAny(x, y)) return { x, y };
  }
  return null;
}

function findRandomInside() {
  for (let attempt = 0; attempt < 5; attempt++) {
    let r = Math.random() * TOTAL_AREA;
    let chosen = strokeData[0];
    for (const d of strokeData) {
      r -= d.area;
      if (r <= 0) { chosen = d; break; }
    }
    for (let i = 0; i < 25; i++) {
      const x = chosen.bbox.x + Math.random() * chosen.bbox.width;
      const y = chosen.bbox.y + Math.random() * chosen.bbox.height;
      if (isInside(chosen.elem, x, y)) return { x, y };
    }
  }
  return null;
}

// === Per-stroke wiggle ===
function applyWiggle() {
  strokeElems.forEach((p) => {
    const dx  = (Math.random() * 1.8 - 0.9).toFixed(2);
    const dy  = (Math.random() * 1.8 - 0.9).toFixed(2);
    const dr  = (Math.random() * 1.2 - 0.6).toFixed(2);
    const dur = (5.0 + Math.random() * 3.0).toFixed(2);
    const dly = (-Math.random() * 4).toFixed(2);
    p.style.setProperty('--dx', dx + 'px');
    p.style.setProperty('--dy', dy + 'px');
    p.style.setProperty('--dr', dr + 'deg');
    p.style.animation = 'none';
    void p.offsetWidth;
    p.style.animation = `wiggle ${dur}s ease-in-out ${dly}s infinite alternate`;
  });
}
applyWiggle();

// === Ballpoint pen hatching — thin, straight, dense, with micro-tremor ===
function pickAngle(dirAngle) {
  if (dirAngle !== undefined) {
    return dirAngle + (Math.random() - 0.5) * 0.25;
  }
  const r = Math.random();
  if (r < 0.72) return -Math.PI / 4 + (Math.random() - 0.5) * 0.18;
  if (r < 0.90) return -Math.PI / 4 + Math.PI / 2 + (Math.random() - 0.5) * 0.18;
  return -Math.PI / 4 + (Math.random() - 0.5) * 0.4;
}

function generateHatchLine(cx, cy, lenMin, lenMax, dirAngle) {
  const angle = pickAngle(dirAngle);
  const length = lenMin + Math.random() * (lenMax - lenMin);
  const halfL = length / 2;
  let x = cx - Math.cos(angle) * halfL;
  let y = cy - Math.sin(angle) * halfL;

  const segments = Math.max(4, Math.floor(length / 8));
  let d = `M ${x.toFixed(2)} ${y.toFixed(2)}`;

  for (let i = 1; i <= segments; i++) {
    const step = length / segments;
    x += Math.cos(angle) * step + (Math.random() - 0.5) * 0.6;
    y += Math.sin(angle) * step + (Math.random() - 0.5) * 0.6;
    d += ` L ${x.toFixed(2)} ${y.toFixed(2)}`;
  }
  return d;
}

// === Hatch line pool — thin, dense, ballpoint pen ===
const MAX_LINES = 1800;
const linePool = [];

function addHatchLine(cx, cy, opts = {}) {
  while (linePool.length >= MAX_LINES) {
    const oldest = linePool.shift();
    if (oldest && oldest.parentNode) oldest.parentNode.removeChild(oldest);
  }

  const lenMin = opts.lenMin ?? 18;
  const lenMax = opts.lenMax ?? 55;
  const dirAngle = opts.dirAngle;

  const path = document.createElementNS(SVG_NS, 'path');
  path.setAttribute('d', generateHatchLine(cx, cy, lenMin, lenMax, dirAngle));
  const sw = (0.3 + Math.random() * 0.45).toFixed(2);
  path.setAttribute('stroke', '#0D0E14');
  path.setAttribute('stroke-width', sw);
  path.setAttribute('stroke-linecap', 'round');
  path.setAttribute('fill', 'none');
  path.style.opacity = (0.75 + Math.random() * 0.25).toFixed(2);

  scribbleStage.appendChild(path);
  linePool.push(path);

  const len = path.getTotalLength();
  path.style.strokeDasharray = len;
  path.style.strokeDashoffset = len;
  const drawDur = Math.max(0.03, Math.min(0.08, len * 0.0008)).toFixed(3);
  path.style.transition = `stroke-dashoffset ${drawDur}s linear`;
  requestAnimationFrame(() => { path.style.strokeDashoffset = '0'; });
}

// === Overshoot lines — bleed outside the letter mask ===
const MAX_OVERSHOOTS = 120;
const overshootPool = [];

function addOvershoot(cx, cy, dirAngle) {
  while (overshootPool.length >= MAX_OVERSHOOTS) {
    const oldest = overshootPool.shift();
    if (oldest && oldest.parentNode) oldest.parentNode.removeChild(oldest);
  }

  const angle = (dirAngle ?? pickAngle()) + (Math.random() - 0.5) * 0.3;
  const length = 8 + Math.random() * 18;
  let x = cx;
  let y = cy;
  const segments = 3 + Math.floor(Math.random() * 3);
  let d = `M ${x.toFixed(2)} ${y.toFixed(2)}`;

  for (let i = 1; i <= segments; i++) {
    const step = length / segments;
    x += Math.cos(angle) * step + (Math.random() - 0.5) * 0.5;
    y += Math.sin(angle) * step + (Math.random() - 0.5) * 0.5;
    d += ` L ${x.toFixed(2)} ${y.toFixed(2)}`;
  }

  const path = document.createElementNS(SVG_NS, 'path');
  path.setAttribute('d', d);
  path.setAttribute('stroke', '#0D0E14');
  path.setAttribute('stroke-width', (0.25 + Math.random() * 0.35).toFixed(2));
  path.setAttribute('stroke-linecap', 'round');
  path.setAttribute('fill', 'none');
  path.style.opacity = (0.3 + Math.random() * 0.3).toFixed(2);

  overshootStage.appendChild(path);
  overshootPool.push(path);

  const len = path.getTotalLength();
  path.style.strokeDasharray = len;
  path.style.strokeDashoffset = len;
  path.style.transition = `stroke-dashoffset 0.06s linear`;
  requestAnimationFrame(() => { path.style.strokeDashoffset = '0'; });
}

// === Pen position tracking ===
let penPos = { x: 168, y: 188 };

function spawnNext(forceJump = false) {
  if (!forceJump && Math.random() < 0.75) {
    const near = findInsideNear(penPos.x, penPos.y, 14);
    if (near) {
      penPos = near;
      addHatchLine(near.x, near.y);
      return;
    }
  }
  const fresh = findRandomInside();
  if (fresh) {
    penPos = fresh;
    addHatchLine(fresh.x, fresh.y);
  }
}

// === Mouse velocity + drag tracking ===
let mouseX = -1, mouseY = -1, mouseInside = false, lastMouseMove = 0;
let prevMouseX = -1, prevMouseY = -1, prevMouseTime = 0;
let mouseVelocity = 0, mouseAngle = 0;
let velocitySmooth = 0;
let isDragging = false;

// Freehand pen drawing state
let penPath = null;
let penPathOver = null;
let penPoints = [];
let penStrokeCount = 0;

function clientToSvg(clientX, clientY) {
  const pt = svg.createSVGPoint();
  pt.x = clientX; pt.y = clientY;
  const ctm = svg.getScreenCTM();
  if (!ctm) return { x: 168, y: 187 };
  const out = pt.matrixTransform(ctm.inverse());
  return { x: out.x, y: out.y };
}

stage.addEventListener('mousedown', (e) => {
  isDragging = true;
  const p = clientToSvg(e.clientX, e.clientY);
  penPoints = [p];

  // Main pen path — inside the letter mask (fills the letters)
  penPath = document.createElementNS(SVG_NS, 'path');
  penPath.setAttribute('stroke', '#0D0E14');
  penPath.setAttribute('stroke-width', (0.5 + Math.random() * 0.3).toFixed(2));
  penPath.setAttribute('stroke-linecap', 'round');
  penPath.setAttribute('stroke-linejoin', 'round');
  penPath.setAttribute('fill', 'none');
  penPath.style.opacity = (0.85 + Math.random() * 0.15).toFixed(2);
  penPath.setAttribute('d', `M ${p.x.toFixed(2)} ${p.y.toFixed(2)}`);
  scribbleStage.appendChild(penPath);
  linePool.push(penPath);

  // Overshoot pen path — outside the mask (bleeds out naturally)
  penPathOver = document.createElementNS(SVG_NS, 'path');
  penPathOver.setAttribute('stroke', '#0D0E14');
  penPathOver.setAttribute('stroke-width', (0.3 + Math.random() * 0.2).toFixed(2));
  penPathOver.setAttribute('stroke-linecap', 'round');
  penPathOver.setAttribute('stroke-linejoin', 'round');
  penPathOver.setAttribute('fill', 'none');
  penPathOver.style.opacity = (0.4 + Math.random() * 0.2).toFixed(2);
  penPathOver.setAttribute('d', `M ${p.x.toFixed(2)} ${p.y.toFixed(2)}`);
  overshootStage.appendChild(penPathOver);
  overshootPool.push(penPathOver);

  penStrokeCount++;
});

window.addEventListener('mouseup', () => {
  isDragging = false;
  penPath = null;
  penPathOver = null;
  penPoints = [];
});

stage.addEventListener('mousemove', (e) => {
  const p = clientToSvg(e.clientX, e.clientY);
  const now = Date.now();
  const dt = now - prevMouseTime;

  if (dt > 0 && prevMouseX >= 0) {
    const dx = p.x - prevMouseX;
    const dy = p.y - prevMouseY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    mouseVelocity = dist / dt * 16;
    mouseAngle = Math.atan2(dy, dx);
    velocitySmooth = velocitySmooth * 0.5 + mouseVelocity * 0.5;
  }

  prevMouseX = mouseX;
  prevMouseY = mouseY;
  prevMouseTime = now;
  mouseX = p.x; mouseY = p.y;
  mouseInside = true;
  lastMouseMove = now;

  // Freehand drawing: actual pen trajectory
  if (isDragging && penPath) {
    const jx = (Math.random() - 0.5) * 0.4;
    const jy = (Math.random() - 0.5) * 0.4;
    const np = { x: p.x + jx, y: p.y + jy };
    penPoints.push(np);

    if (penPoints.length >= 3) {
      const pts = penPoints;
      const len = pts.length;
      const p1 = pts[len - 2];
      const p2 = pts[len - 1];
      const seg = ` Q ${p1.x.toFixed(2)} ${p1.y.toFixed(2)} ${((p1.x + p2.x) / 2).toFixed(2)} ${((p1.y + p2.y) / 2).toFixed(2)}`;
      penPath.setAttribute('d', penPath.getAttribute('d') + seg);
      if (penPathOver) {
        penPathOver.setAttribute('d', penPathOver.getAttribute('d') + seg);
      }
    }

    // Velocity-scaled hatching: faster = more lines, longer, wider spread
    const spawnChance = Math.min(0.95, 0.25 + velocitySmooth * 0.12);
    const count = Math.min(8, Math.max(1, Math.floor(velocitySmooth / 1.5)));
    const spread = 5 + velocitySmooth * 2.5;
    const lenBoost = Math.min(30, velocitySmooth * 3);

    for (let i = 0; i < count; i++) {
      if (Math.random() < spawnChance) {
        const near = findInsideNear(p.x, p.y, spread);
        if (near) addHatchLine(near.x, near.y, {
          dirAngle: mouseAngle + Math.PI / 2 + (Math.random() - 0.5) * 0.4,
          lenMin: 10 + lenBoost * 0.5,
          lenMax: 25 + lenBoost
        });
      }
    }
  }
});
stage.addEventListener('mouseleave', () => { mouseInside = false; velocitySmooth = 0; });

stage.addEventListener('click', (e) => {
  const p = clientToSvg(e.clientX, e.clientY);
  for (let i = 0; i < 25; i++) {
    setTimeout(() => {
      const near = findInsideNear(p.x, p.y, 20);
      if (near) addHatchLine(near.x, near.y, { lenMin: 20, lenMax: 50 });
    }, i * 10);
  }
});

// === Initial dense fill ===
function initialDraw() {
  const TOTAL = 400;
  const DURATION = 2000;
  for (let i = 0; i < TOTAL; i++) {
    setTimeout(() => {
      const jump = (i % (3 + Math.floor(Math.random() * 2)) === 0);
      spawnNext(jump);
      // Occasional overshoot during initial fill for natural look
      if (Math.random() < 0.06) {
        const pt = findRandomInside();
        if (pt) addOvershoot(pt.x, pt.y);
      }
    }, i * (DURATION / TOTAL));
  }
}

// === Ambient — slow continuous hatching ===
let ambientInterval;
function startAmbient() {
  ambientInterval = setInterval(() => {
    const now = Date.now();
    const recent = mouseInside && (now - lastMouseMove) < 500;

    if (recent && !isDragging && velocitySmooth > 1.0) {
      const count = Math.min(3, Math.floor(velocitySmooth / 3));
      for (let i = 0; i < count; i++) {
        const near = findInsideNear(mouseX, mouseY, 12 + velocitySmooth * 2);
        if (near) addHatchLine(near.x, near.y, {
          dirAngle: mouseAngle + Math.PI / 2,
          lenMin: 15,
          lenMax: 40
        });
      }
    } else if (!isDragging) {
      if (Math.random() < 0.25) spawnNext(Math.random() < 0.3);
    }
  }, 100);
}

window.requestAnimationFrame(() => {
  setTimeout(() => {
    initialDraw();
    setTimeout(startAmbient, 2200);
  }, 100);
});

// === Controls ===
document.getElementById('clear').addEventListener('click', () => {
  while (linePool.length) {
    const p = linePool.shift();
    p.style.transition = 'opacity 0.25s ease-out';
    p.style.opacity = '0';
    setTimeout(() => p.parentNode && p.parentNode.removeChild(p), 250);
  }
  while (overshootPool.length) {
    const p = overshootPool.shift();
    p.style.transition = 'opacity 0.25s ease-out';
    p.style.opacity = '0';
    setTimeout(() => p.parentNode && p.parentNode.removeChild(p), 250);
  }
  setTimeout(initialDraw, 350);
});

document.getElementById('reshuffle').addEventListener('click', () => {
  applyWiggle();
});
</script>

</body>
</html>
