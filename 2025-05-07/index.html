<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Wardrobe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500&family=Righteous&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:#fff;overflow:hidden;}

  .home-btn{
    position:fixed;top:22px;left:24px;z-index:100;
    font:500 11px/1 "Helvetica Neue",sans-serif;letter-spacing:.18em;
    color:rgba(0,0,0,.35);text-decoration:none;
    padding:8px 12px;border:1px solid rgba(0,0,0,.12);
    border-radius:2px;transition:all .4s ease;
  }
  .home-btn:hover{color:#000;border-color:rgba(0,0,0,.5);}

  .stage{
    position:fixed;inset:0;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:2vh;padding:4vh 4vw;
  }

  .word{
    display:flex;gap:0;
    width:min(90vw, 1000px);
    position:relative;
    perspective:1200px;
  }
  .letter{flex:1;position:relative;}
  .letter img{width:100%;height:auto;display:block;}
  .letter .top-wrap{
    transform-origin:50% 100%;
    transform:rotateX(180deg);
    transition:transform var(--speed) cubic-bezier(.4,.0,.2,1);
    transition-timing-function:steps(var(--steps));
    backface-visibility:visible;
  }
  .letter.open .top-wrap{transform:rotateX(0deg);}

  /* 스티커 블록 */
  .blocks{position:absolute;inset:0;pointer-events:none;z-index:10;}
  .block{
    position:absolute;
    font:400 clamp(11px,1.8vw,20px)/1 "Righteous",sans-serif;
    color:#fff;
    padding:0.35em 0.7em;
    white-space:nowrap;
    opacity:0;
    transform:scale(0.8);
    transition:opacity 0.05s, transform 0.15s cubic-bezier(.2,1,.3,1);
  }
  .block.stuck{
    opacity:1;
    transform:scale(1) rotate(var(--rot));
  }

  .lyrics{
    text-align:center;
    opacity:0;transition:opacity 1s ease;
    margin-top:1.5vh;
  }
  .lyrics.show{opacity:1;}
  .lyrics span{
    font:500 clamp(8px,0.85vw,11px)/1 "Noto Sans KR",sans-serif;
    color:rgba(0,0,0,.4);letter-spacing:.04em;
  }

  .credit{
    position:fixed;bottom:16px;right:24px;
    font:400 9px/1 "Helvetica Neue",sans-serif;
    letter-spacing:.08em;color:rgba(0,0,0,.2);
  }
</style>
</head>
<body>
<a class="home-btn" href="../index.html">HOME</a>

<div class="stage">
  <div class="word" id="word">
    <div class="blocks" id="blocks"></div>
  </div>
  <div class="lyrics" id="lyrics">
    <span>내 옷장은 나의 꿈  내 옷장은 환상  내 옷장은 나의 사랑</span>
  </div>
</div>

<div class="credit">2025.05.07 · Wardrobe</div>

<script>
const word = document.getElementById('word');
const blocks = document.getElementById('blocks');
const lyrics = document.getElementById('lyrics');

// 옷 접기 애니메이션
const config = [
  {speed:'1.4s', steps:10, delay:0.8},
  {speed:'1.0s', steps:8,  delay:1.4},
  {speed:'1.3s', steps:9,  delay:0.5},
  {speed:'1.1s', steps:8,  delay:1.7},
  {speed:'1.2s', steps:10, delay:1.0},
  {speed:'0.9s', steps:7,  delay:2.0},
  {speed:'1.1s', steps:8,  delay:1.3},
  {speed:'1.3s', steps:9,  delay:2.2},
];

for(let i = 0; i < 8; i++){
  const c = config[i];
  const div = document.createElement('div');
  div.className = 'letter';
  div.style.setProperty('--speed', c.speed);
  div.style.setProperty('--steps', c.steps);
  div.innerHTML = `
    <div class="top-wrap"><img src="p${i}_top.png"></div>
    <div class="bot-wrap"><img src="p${i}_bot.png"></div>
  `;
  word.insertBefore(div, blocks);
  setTimeout(() => div.classList.add('open'), c.delay * 1000);
}

// 스티커 블록 — 옷 위에 탁탁 붙음
const foldDone = Math.max(...config.map(c => c.delay)) * 1000 + 1500;

const phrases = ['My closet','is my dream','My closet','is a fantasy','My closet','is my love','dream','fantasy','love','closet','my dream','my love','is a','fantasy','closet','dream','My','love','is','closet','fantasy','dream','My closet','is my','love','dream','a fantasy','my'];
const colors = ['#e74c3c','#8e44ad','#27ae60','#2980b9','#f39c12','#e91e63','#1abc9c','#34495e','#d35400','#9b59b6','#16a085','#c0392b'];

for(let i = 0; i < 30; i++){
  const el = document.createElement('div');
  el.className = 'block';
  el.textContent = phrases[i % phrases.length];
  el.style.background = colors[i % colors.length];
  el.style.left = (2 + Math.random()*88) + '%';
  el.style.top = (2 + Math.random()*88) + '%';
  const rot = (Math.random()*16 - 8).toFixed(1);
  el.style.setProperty('--rot', rot + 'deg');
  blocks.appendChild(el);

  // 탁탁 붙기 — 짧은 간격으로 즉시 나타남
  setTimeout(() => el.classList.add('stuck'), foldDone + i * 80);
}

// 가사
setTimeout(() => lyrics.classList.add('show'), foldDone + 30 * 80 + 400);
</script>
</body>
</html>
