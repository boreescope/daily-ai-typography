<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Typography Artwork</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@200;300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #fff;
      font-family: 'Noto Sans KR', sans-serif;
      color: #1a1a1a;
    }

    /* ── Header ── */
    header {
      padding: 10vh 8vw 2vh;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .header-left h1 {
      font-size: clamp(2.2rem, 5vw, 4.5rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1.05;
    }

    .header-left h1 span {
      display: block;
      font-weight: 200;
      font-size: 0.35em;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 0.6rem;
    }

    .header-right {
      text-align: right;
      padding-bottom: 0.4rem;
    }

    .header-right .count {
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .header-right .count-label {
      font-size: 0.7rem;
      font-weight: 300;
      color: #aaa;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 0.3rem;
    }

    /* ── Divider ── */
    .divider {
      margin: 3vh 8vw 4vh;
      height: 1px;
      background: #e0e0e0;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 0;
      padding: 0 8vw 10vh;
    }

    /* ── Card ── */
    .card {
      position: relative;
      display: block;
      text-decoration: none;
      color: inherit;
      border: 1px solid #f0f0f0;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .card:hover {
      border-color: #ccc;
    }

    .card-preview {
      position: relative;
      aspect-ratio: 16 / 10;
      background: #fafafa;
      overflow: hidden;
    }

    .card-preview iframe {
      width: 250%;
      height: 250%;
      border: none;
      transform: scale(0.4);
      transform-origin: top left;
      pointer-events: none;
    }

    .card-preview::after {
      content: '';
      position: absolute;
      inset: 0;
      background: transparent;
      transition: background 0.3s;
    }

    .card:hover .card-preview::after {
      background: rgba(0,0,0,0.03);
    }

    .card-meta {
      padding: 1.4rem 1.6rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      border-top: 1px solid #f0f0f0;
    }

    .card-meta .meta-left .date {
      font-size: 0.7rem;
      font-weight: 300;
      color: #aaa;
      letter-spacing: 0.08em;
    }

    .card-meta .meta-left .title {
      font-size: 0.95rem;
      font-weight: 400;
      margin-top: 0.35rem;
      line-height: 1.45;
      letter-spacing: -0.01em;
    }

    .card-meta .arrow {
      font-size: 1.1rem;
      color: #ccc;
      transition: color 0.3s, transform 0.3s;
      flex-shrink: 0;
      margin-top: 0.2rem;
    }

    .card:hover .arrow {
      color: #1a1a1a;
      transform: translateX(3px);
    }

    /* ── Footer ── */
    footer {
      padding: 4vh 8vw 6vh;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    footer .left {
      font-size: 0.72rem;
      font-weight: 300;
      color: #bbb;
      letter-spacing: 0.05em;
    }

    footer .right {
      font-size: 0.72rem;
      font-weight: 300;
      color: #bbb;
    }

    @media (max-width: 600px) {
      header { padding: 8vh 6vw 2vh; flex-direction: column; align-items: flex-start; gap: 2rem; }
      .header-right { text-align: left; }
      .divider { margin: 2vh 6vw 3vh; }
      .grid { padding: 0 0 8vh; grid-template-columns: 1fr; }
      .card { border-left: none; border-right: none; }
      footer { padding: 3vh 6vw 5vh; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <h1>
        <span>AI Typography Artwork Archive</span>
        Daily<br>Typography
      </h1>
    </div>
    <div class="header-right">
      <div class="count" id="count">—</div>
      <div class="count-label">Works</div>
    </div>
  </header>

  <div class="divider"></div>

  <div class="grid" id="grid"></div>

  <footer>
    <div class="left">하루에 하나씩, AI로 만드는 타이포그래피 아트워크</div>
    <div class="right">© 2025</div>
  </footer>

  <script>
    const works = [
      {
        date: '2025.04.21',
        title: '대전 빵집서 \'늑구빵\' 공식 판매 중',
        folder: '2025-04-21',
      },
      {
        date: '2025.04.20',
        title: 'You\'re the product being sold',
        folder: '2025-04-20',
      },
      {
        date: '2025.04.17',
        title: '한국 유조선, \'우회로\' 홍해 통과…호르무즈 봉쇄 뒤 처음',
        folder: '2025-04-17',
      },
      {
        date: '2025.04.16',
        title: '겁 많은 고양이',
        folder: '2025-04-16',
      },
      {
        date: '2025.04.15',
        title: 'Z세대는 왜 카세트를 다시 집어들었나',
        folder: '2025-04-15',
      },
    ];

    document.getElementById('count').textContent = String(works.length).padStart(2, '0');

    const grid = document.getElementById('grid');

    works.forEach((w, i) => {
      const a = document.createElement('a');
      a.href = `${w.folder}/index.html`;
      a.className = 'card';
      a.innerHTML = `
        <div class="card-preview">
          <iframe src="${w.folder}/index.html" loading="lazy" tabindex="-1" scrolling="no"></iframe>
        </div>
        <div class="card-meta">
          <div class="meta-left">
            <div class="date">NO.${String(i + 1).padStart(3, '0')}  ·  ${w.date}</div>
            <div class="title">${w.title}</div>
          </div>
          <div class="arrow">→</div>
        </div>
      `;
      grid.appendChild(a);
    });
  </script>

</body>
</html>
