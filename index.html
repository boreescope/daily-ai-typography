<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Typography Artwork</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700;900&family=Archivo+Black&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f2f0eb;
      --fg: #111;
      --mute: #8a8680;
      --accent: #ffde3b;
    }

    html, body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Noto Sans KR', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Top bar ── */
    .topbar {
      padding: 2.2vh 4vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--mute);
      border-bottom: 1px solid #d8d4cc;
    }

    .topbar .right { display: flex; gap: 2rem; }

    /* ── Hero ── */
    .hero {
      padding: 8vh 4vw 4vh;
      position: relative;
    }

    .hero .eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--mute);
      margin-bottom: 2.5vh;
    }

    .hero-title {
      font-family: 'Archivo Black', 'Noto Sans KR', sans-serif;
      font-weight: 900;
      font-size: clamp(3rem, 8.5vw, 9rem);
      line-height: 0.92;
      letter-spacing: -0.03em;
      text-transform: uppercase;
    }

    .hero-title .line2 {
      display: block;
      padding-left: 0.15em;
    }

    .hero-title .accent {
      background: var(--accent);
      padding: 0 0.12em;
      display: inline-block;
    }

    .hero-sub {
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 500;
      font-size: clamp(0.9rem, 1.2vw, 1.1rem);
      color: var(--fg);
      max-width: 52ch;
      margin-top: 4vh;
      line-height: 1.55;
    }

    .hero-meta {
      display: flex;
      gap: 3rem;
      margin-top: 5vh;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mute);
    }

    .hero-meta b { color: var(--fg); font-weight: 700; }

    /* ── Section label ── */
    .section-label {
      padding: 6vh 4vw 2vh;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid #d8d4cc;
      margin-top: 6vh;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mute);
    }

    /* ── Works list ── */
    .works {
      padding: 0 4vw 4vh;
      position: relative;
    }

    .row {
      position: relative;
      display: grid;
      grid-template-columns: 5rem 6rem 1fr auto 3rem;
      gap: 2vw;
      align-items: center;
      padding: 2.8vh 0;
      border-top: 1px solid #d8d4cc;
      text-decoration: none;
      color: var(--fg);
      transition: padding 0.4s ease;
      cursor: pointer;
    }

    .row:last-child { border-bottom: 1px solid #d8d4cc; }

    .row .no {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--mute);
    }

    .row .date {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: var(--mute);
    }

    .row .title {
      font-family: 'Archivo Black', 'Noto Sans KR', sans-serif;
      font-weight: 900;
      font-size: clamp(1.6rem, 3.8vw, 3.8rem);
      line-height: 1;
      letter-spacing: -0.02em;
      transition: transform 0.4s ease, color 0.3s ease;
      transform-origin: left center;
    }

    .row .tags {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .row .tag {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      padding: 0.4em 0.8em;
      border: 1px solid #bdb9b1;
      border-radius: 999px;
      color: var(--mute);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .row .arrow {
      font-family: 'Archivo Black', sans-serif;
      font-size: 1.6rem;
      color: var(--fg);
      transition: transform 0.4s ease;
    }

    .row:hover {
      background: var(--fg);
      color: var(--bg);
    }
    .row:hover .no,
    .row:hover .date,
    .row:hover .tag {
      color: var(--bg);
      border-color: var(--bg);
    }
    .row:hover .arrow {
      color: var(--accent);
      transform: translateX(8px);
    }
    .row:hover .title {
      color: var(--accent);
    }

    /* Hover preview floating thumb */
    .hover-preview {
      position: fixed;
      top: 0; left: 0;
      width: 320px;
      height: 200px;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.9);
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 100;
      border: 2px solid var(--fg);
      background: var(--bg);
      overflow: hidden;
      box-shadow: 6px 6px 0 var(--fg);
    }

    .hover-preview.on {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .hover-preview iframe {
      width: 250%;
      height: 250%;
      border: none;
      transform: scale(0.4);
      transform-origin: top left;
      pointer-events: none;
    }

    /* ── Footer ── */
    footer {
      padding: 8vh 4vw 4vh;
      border-top: 1px solid #d8d4cc;
      display: flex;
      justify-content: flex-end;
      align-items: flex-end;
      gap: 4vw;
      flex-wrap: wrap;
    }

    .footer-big {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(2.2rem, 6vw, 6rem);
      line-height: 0.95;
      letter-spacing: -0.03em;
      text-transform: uppercase;
    }

    .footer-meta {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mute);
      text-align: right;
    }
    .footer-meta p { margin-bottom: 0.8em; }
    .footer-meta b { color: var(--fg); font-weight: 700; }

    @media (max-width: 720px) {
      .row {
        grid-template-columns: 3rem 1fr auto;
        gap: 3vw;
      }
      .row .date { display: none; }
      .row .tags { grid-column: 1 / -1; justify-content: flex-start; margin-top: 0.8rem; }
      .hover-preview { display: none; }
      .hero-meta { flex-wrap: wrap; gap: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div>Daily Typography Archive / 2026</div>
    <div class="right">
      <div id="clock">--:--</div>
      <div>Seoul, KR</div>
    </div>
  </div>

  <section class="hero">
    <div class="eyebrow">— Boree Choi / Vibe Coding Daily</div>
    <h1 class="hero-title">
      Daily<br>
      <span class="line2"><span class="accent">Typo</span>graphy</span>
    </h1>
    <p class="hero-sub">
      하루에 하나씩, AI와 함께 만드는 타이포그래피 아트워크.
      일상의 텍스트를 움직이는 타이포그래피로 재해석합니다.
    </p>
    <div class="hero-meta">
      <div>Works <b id="count">—</b></div>
      <div>Since <b>2026.04</b></div>
      <div>Status <b style="color:#ff3b3b">● Live</b></div>
    </div>
  </section>

  <div class="section-label">
    <div>Index — All Works</div>
    <div>Scroll ↓</div>
  </div>

  <section class="works" id="works"></section>

  <div class="hover-preview" id="hoverPreview">
    <iframe id="hoverFrame" src="" loading="lazy" scrolling="no"></iframe>
  </div>

  <footer>
    <div class="footer-meta">
      <p>© 2026 <b>Boree Choi</b></p>
      <p>Built with Kiro</p>
      <p><a href="https://github.com/boreescope/daily-ai-typography-" style="color:inherit; text-decoration: underline;">github ↗</a></p>
    </div>
  </footer>

  <script>
    const works = [
      {
        date: '26.04.28',
        title: 'Data Flight Patterns',
        desc: '마우스 궤적이 데이터 도시로 솟아오른다',
        folder: '2025-04-28',
        tags: ['Data', '3D', 'Aaron Koblin'],
      },
      {
        date: '26.04.27',
        title: '마음의 심폐소생',
        desc: '3D 블록 타이포그래피 가든',
        folder: '2025-04-27',
        tags: ['3D', 'Interactive', 'Garden'],
      },
      {
        date: '26.04.24',
        title: 'Two Worlds',
        desc: '서로 다른 세계가 접속하는 방식',
        folder: '2025-04-24',
        tags: ['Split', 'Cursor', 'Mirror'],
      },
      {
        date: '26.04.23',
        title: '친환경 → 돈',
        desc: '기업의 진정성 있는 친환경 활동 무조건 \'돈\' 된다',
        folder: '2025-04-23',
        tags: ['Green', 'Gold', 'Particles'],
      },
      {
        date: '26.04.22',
        title: 'Numerological Analysis',
        desc: 'Every letter holds a number',
        folder: '2025-04-22',
        tags: ['Numerology', 'Interactive', 'Chart'],
      },
      {
        date: '26.04.21',
        title: '늑구빵',
        desc: '대전 빵집서 \'늑구빵\' 공식 판매 중',
        folder: '2025-04-21',
        tags: ['Baking', 'Character', 'Animation'],
      },
      {
        date: '26.04.20',
        title: 'Terms and Conditions',
        desc: 'If you are not paying for it...',
        folder: '2025-04-20',
        tags: ['Satire', 'Scroll', 'Interaction'],
      },
      {
        date: '26.04.17',
        title: '홍해 통과',
        desc: '한국 유조선, \'우회로\' 홍해 통과',
        folder: '2025-04-17',
        tags: ['Metaball', 'SVG', 'Wave'],
      },
      {
        date: '26.04.16',
        title: '겁 많은 고양이',
        desc: '오늘도 너와 너의 겁 많은 고양이가',
        folder: '2025-04-16',
        tags: ['Lyrics', 'Typing', 'Ambient'],
      },
      {
        date: '26.04.15',
        title: 'Cassette',
        desc: 'Z세대는 왜 카세트를 다시 집어들었나',
        folder: '2025-04-15',
        tags: ['Cassette', 'OnPath', 'Loop'],
      },
    ];

    document.getElementById('count').textContent = String(works.length).padStart(2, '0');

    const worksEl = document.getElementById('works');
    const total = works.length;

    works.forEach((w, i) => {
      const no = String(total - i).padStart(3, '0');
      const a = document.createElement('a');
      a.href = `${w.folder}/index.html`;
      a.className = 'row';
      a.dataset.folder = w.folder;
      a.innerHTML = `
        <div class="no">№ ${no}</div>
        <div class="date">${w.date}</div>
        <div class="title">${w.title}</div>
        <div class="tags">${w.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        <div class="arrow">→</div>
      `;
      worksEl.appendChild(a);
    });

    // Hover preview
    const hp = document.getElementById('hoverPreview');
    const hpFrame = document.getElementById('hoverFrame');
    let currentFolder = null;

    document.querySelectorAll('.row').forEach(row => {
      row.addEventListener('mouseenter', () => {
        const folder = row.dataset.folder;
        if (folder !== currentFolder) {
          hpFrame.src = `${folder}/index.html?preview=1`;
          currentFolder = folder;
        }
        hp.classList.add('on');
      });
      row.addEventListener('mouseleave', () => {
        hp.classList.remove('on');
      });
      row.addEventListener('mousemove', (e) => {
        hp.style.left = e.clientX + 'px';
        hp.style.top = e.clientY + 'px';
      });
    });

    // Clock
    const clock = document.getElementById('clock');
    function updateClock() {
      const d = new Date();
      const h = String(d.getHours()).padStart(2, '0');
      const m = String(d.getMinutes()).padStart(2, '0');
      const s = String(d.getSeconds()).padStart(2, '0');
      clock.textContent = `${h}:${m}:${s}`;
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>

</body>
</html>
